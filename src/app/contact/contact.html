<div class="contact-page">
  <!-- Hero -->
  <section class="contact-hero text-center">
    <div class="container">
      <h1>Contact Us</h1>
      <p class="text-muted">Have questions? We'd love to hear from you.</p>
    </div>
  </section>

  <!-- Contact Info -->
  <section class="contact-info container mt-5">
    <div class="row text-center">
      <div class="col-md-4">
        <div class="contact-card">
          <h5>📍 Address</h5>
          <p>Hyderabad, India</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="contact-card">
          <h5>📞 Phone</h5>
          <p>+91 9876543210</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="contact-card">
          <h5>✉ Email</h5>
          <p>support@shopkart.com</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="contact-form container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <h3 class="mb-4 text-center">Send us a message</h3>

        <form>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Your Name" />
          </div>

          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Your Email" />
          </div>

          <div class="mb-3">
            <textarea rows="4" class="form-control" placeholder="Your Message"></textarea>
          </div>

          <button class="btn btn-primary w-100">Send Message</button>
        </form>
      </div>
    </div>
  </section>
</div>
