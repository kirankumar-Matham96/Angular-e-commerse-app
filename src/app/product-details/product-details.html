@if (product) {
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-5 text-center">
        <img [src]="product.image" class="img-fluid" style="max-height: 400px" />
      </div>

      <div class="col-md-7">
        <h3>{{ product.title }}</h3>
        <p class="text-muted">Category: {{ product.category }}</p>
        <h4 class="text-success">₹{{ product.price }}</h4>
        <p class="mt-4">
          {{ product.description }}
        </p>
        <button class="btn btn-primary me-3" (click)="addToCart()">Add to Cart</button>
        <button class="btn btn-outline-danger" (click)="addToWishList()">♥ Wishlist</button>
      </div>
    </div>
  </div>
}
