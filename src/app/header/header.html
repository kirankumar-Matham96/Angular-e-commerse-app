<header class="container-fluid text-bg-light sticky-top shadow">
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <a class="navbar-brand brand" routerLink="/home">Orniva</a>

      <div class="d-flex align-items-center">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav ms-3">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" routerLink="/home">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/products">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/contact">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/orders">My Orders</a>
            </li>
          </ul>

          <div class="d-flex align-items-center justify-content-center">
            <i class="bi bi-search nav-icon"></i>

            <i class="bi bi-heart nav-icon"></i>

            <div #cartWrapper class="cart-wrapper" routerLink="/cart">
              <i class="bi bi-bag-heart nav-icon"></i>
              @let count = cartItemsCount | async;
              @if (count) {
                <span #cartBadge class="cart-badge" [hidden]="count === 0">{{ count }}</span>
              }
            </div>

            <i class="bi bi-person-circle nav-icon" routerLink="/signin"></i>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>
